services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: rubricheck-postgres
    restart: always
    env_file: [.env]
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    networks: [rubricheck-network]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_NAME} -h localhost -p 5432",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: rubricheck-backend
    restart: always
    env_file: [.env]
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      APP_URL: ${APP_URL:-}
    ports:
      - "${BACKEND_HOST_PORT}:${BACKEND_CONTAINER_PORT}"
    networks:
      - rubricheck-network
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "dokploy.expose=true"
      - "dokploy.domain=${DOKPLOY_DOMAIN}"
      - "dokploy.path=/api"
      - "dokploy.port=${BACKEND_CONTAINER_PORT}"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:${BACKEND_CONTAINER_PORT}/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: rubricheck-n8n
    restart: unless-stopped
    user: "1000:1000"
    env_file: [.env]
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${DB_HOST}
      DB_POSTGRESDB_PORT: ${DB_PORT}
      DB_POSTGRESDB_DATABASE: ${DB_NAME}
      DB_POSTGRESDB_USER: ${DB_USER}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD}
      DB_POSTGRESDB_SCHEMA: public

      N8N_BASIC_AUTH_ACTIVE: "${N8N_BASIC_AUTH_ACTIVE}"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}

      NODE_ENV: production
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_RUNNERS_ENABLED: "${N8N_RUNNERS_ENABLED}"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS}"

      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_PATH: /

      N8N_LISTEN_ADDRESS: 0.0.0.0
      N8N_SECURE_COOKIE: "false"
      N8N_COOKIE_SECURE: "false"
    labels:
      - "dokploy.expose=true"
      - "dokploy.domain=${DOKPLOY_DOMAIN}"
      - "dokploy.path=/n8n"
      - "dokploy.port=${N8N_PORT}"
    ports:
      - "${N8N_HOST_PORT}:${N8N_PORT}"
    networks:
      - rubricheck-network
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_COMPANY_NAME: ${VITE_COMPANY_NAME}
        # Moodle disabled by default - set in .env to enable
        VITE_MOODLE_WEB_SERVICE_URL: ${VITE_MOODLE_WEB_SERVICE_URL:-}
        VITE_WSTOKEN: ${VITE_WSTOKEN:-}
    container_name: rubricheck-frontend
    restart: always
    env_file: [.env]
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_CONTAINER_PORT}"
    networks:
      - rubricheck-network
      - dokploy-network
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "dokploy.expose=true"
      - "dokploy.domain=${DOKPLOY_DOMAIN}"
      - "dokploy.path=/"
      - "dokploy.port=${FRONTEND_CONTAINER_PORT}"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${FRONTEND_CONTAINER_PORT}/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  n8n_data:

networks:
  rubricheck-network:
    driver: bridge
  dokploy-network:
    external: true
